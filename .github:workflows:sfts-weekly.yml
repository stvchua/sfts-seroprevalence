name: SFTS Weekly Data Download

on:
  schedule:
    # Runs every Monday at 02:00 UTC
    # JIHS typically publishes the previous week's data on Monday
    - cron: "0 2 * * 1"
  workflow_dispatch:        # allows manual runs from the GitHub UI
    inputs:
      reason:
        description: "Reason for manual run"
        required: false

jobs:
  fetch-sfts:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push committed data back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true   # faster binary installs

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}-jpinfect
          restore-keys: r-${{ runner.os }}-

      - name: Install dependencies
        run: |
          install.packages(c("jpinfect", "dplyr", "remotes"))
          # Uncomment for the latest provisional data:
          # remotes::install_github("TomonoriHoshi/jpinfect")
        shell: Rscript {0}

      - name: Run SFTS download script
        run: Rscript R/fetch_sfts.R

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/
          # Only commit if there are changes
          git diff --staged --quiet || \
            git commit -m "data: update SFTS weekly data [$(date -u +%Y-%m-%d)]"
          git push
          
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `SFTS download failed – ${new Date().toISOString().slice(0,10)}`,
              body:  `The weekly SFTS data workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ["automated", "data-pipeline"]
            })    
          
          